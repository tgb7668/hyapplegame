<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 흐융사과게임 🍎</title>
<style>
    body {
        font-family: 'Malgun Gothic', sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
        background-color: #ffffff;

        /* 🌟 배경 설정: 가로 한 줄(좌, 중, 우) 배치 */
        background-image: url('tile.png'), url('tile.png'), url('tile.png');
        
        /* 위치: 모든 이미지를 수직 중앙(center) 근처 가로 라인에 배치 */
        background-position: 
            left 2% center,    /* 좌측 수직 중앙 */
            center center,     /* 정중앙 (게임판 뒤쪽) */
            right 2% center;   /* 우측 수직 중앙 */
            
        background-repeat: no-repeat;
        
        /* 크기: 가로 정렬 시 답답하지 않게 크기 최적화 */
        background-size: 
            280px auto,   /* 좌측 사과 */
            400px auto,   /* 중앙 사과 (배경 느낌) */
            280px auto;   /* 우측 사과 */
            
        background-attachment: fixed;
        overflow-x: hidden;
    }

    /* 📱 모바일 환경: 가로 공간이 부족하므로 크기를 줄이고 투명도 조절 */
    @media (max-width: 768px) {
        body {
            background-size: 150px auto, 250px auto, 150px auto;
            background-position: 
                left -30px center, 
                center center, 
                right -30px center;
        }
    }

    h2 { 
        display: block; 
        margin: 40px auto 20px auto; 
        background: rgba(255,255,255,0.85);
        padding: 10px 30px; 
        border-radius: 15px;
        width: fit-content; 
        position: relative;
        z-index: 20;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    #game-controls { 
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin: 0 auto 20px auto; 
        background: rgba(255,255,255,0.85);
        padding: 30px;
        border-radius: 15px;
        position: relative;
        z-index: 20;
        width: fit-content;         
    }

    input#username { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 220px; font-size: 16px; box-sizing: border-box; }
    #startBtn { padding: 12px; width: 220px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; box-sizing: border-box; }

    #board-outer-container {
        width: 100%;
        display: flex;
        justify-content: center; 
        align-items: flex-start;
        padding-bottom: 50px;
    }

    #board {
        display: grid;
        grid-template-columns: repeat(15, 52px);
        grid-template-rows: repeat(10, 52px);
        border: 4px solid #333; 
        width: max-content;
        background: rgba(255, 255, 255, 0.96);
        user-select: none;
        position: relative;
        z-index: 15;
        transform-origin: top center; 
        touch-action: none;
        margin: 20px 0; 
    }

    .cell { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; position: relative; }
    .cell img { position: absolute; width: 90%; height: 90%; object-fit: contain; opacity: 0.7; z-index: 0; pointer-events: none; }
    .cell span { position: relative; z-index: 1; color: #000; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff; }
    .selected { background-color: rgba(76, 175, 80, 0.3); outline: 2px solid #4caf50; z-index: 5; }

    #info-panel { font-size: 20px; margin-bottom: 10px; font-weight: bold; position: relative; z-index: 20; background: rgba(255,255,255,0.85); display: inline-block; padding: 5px 15px; border-radius: 20px; }

    #end { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #fff; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #rankingBox { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; width: 280px; margin-top: 15px; }
    .rank-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<!-- 스크립트 부분은 이전과 동일하므로 생략하거나 기존 코드를 그대로 사용하세요 -->
