<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 흐융사과게임 🍎</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* PC에서 배경 미출력 문제를 방지하기 위한 전용 배경 레이어 */
    #bg-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('background.png'); /* 🌟 배경 파일명 확인 */
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        z-index: -2;
    }

    body {
        font-family: 'Malgun Gothic', sans-serif;
        text-align: center;
        min-height: 100vh;
        overflow-x: hidden;
        background-color: #ffffff;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.15); 
        z-index: -1;
    }

    h2 { 
        display: block; 
        margin: 40px auto 20px auto; 
        background: rgba(255,255,255,0.9);
        padding: 15px 40px; 
        border-radius: 20px;
        width: fit-content; 
        position: relative;
        z-index: 20;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    #game-controls { 
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin: 0 auto 20px auto; 
        background: rgba(255,255,255,0.9);
        padding: 30px;
        border-radius: 15px;
        position: relative;
        z-index: 20;
        width: fit-content;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    /* 초기 화면 BGM 활성화 안내 문구 */
    #bgm-notice {
        font-size: 12px;
        color: #666;
        margin-top: -5px;
    }

    input#username { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 220px; font-size: 16px; outline: none; }
    #startBtn { padding: 12px; width: 220px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }

    #info-panel { font-size: 22px; margin-bottom: 15px; font-weight: bold; position: relative; z-index: 20; background: rgba(255,255,255,0.95); display: inline-block; padding: 8px 20px; border-radius: 25px; }

    #board-outer-container { width: 100%; display: flex; justify-content: center; align-items: flex-start; padding-bottom: 50px; }
    #board {
        display: grid;
        grid-template-columns: repeat(15, 52px);
        grid-template-rows: repeat(10, 52px);
        border: 4px solid #333; 
        width: max-content;
        background: rgba(255, 255, 255, 0.98);
        user-select: none;
        position: relative;
        z-index: 15;
        transform-origin: top center; 
        touch-action: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .cell { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; position: relative; }
    .cell img { position: absolute; width: 90%; height: 90%; object-fit: contain; opacity: 0.7; z-index: 0; pointer-events: none; }
    .cell span { position: relative; z-index: 1; color: #000; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff; }
    .selected { background-color: rgba(76, 175, 80, 0.5); outline: 3px solid #4caf50; z-index: 5; }

    #end { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #fff; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
</style>
</head>
<body onclick="handleFirstClick()"> <!-- 첫 클릭 시 BGM 재생을 유도 -->

<div id="bg-container"></div> <!-- PC 배경 로딩용 레이어 -->

<h2>🍎 흐융사과게임 🍎</h2>

<div id="game-controls">
    <input id="username" placeholder="닉네임 입력">
    <button id="startBtn">게임 시작</button>
    <p id="bgm-notice">화면을 클릭하면 음악이 시작됩니다 🎵</p>
</div>

<div id="game" style="display:none">
    <div id="info-panel">⏰ <span id="timer">120</span> | 🏆 점수: <span id="score">0</span></div>
    <div id="board-outer-container">
        <div id="board"></div>
    </div>
</div>

<div id="end">
    <h3 id="endMsg">게임 종료!</h3>
    <div id="finalScore" style="font-size: 22px; margin-bottom: 10px;"></div>
    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px;">다시 시작</button>
</div>

<!-- 오디오 파일 설정 -->
<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="sfx-score" src="score.mp3"></audio> <!-- 🌟 점수 획득 효과음 파일명 -->

<script>
const RANKING_URL = "https://script.google.com/macros/s/AKfycbyYXtYHm6DJIKDuyy1DhuN1n4Qmf3mk5X8lE36Za5-05uGT1rAJ8HeKkPGLKsYX_enGlg/exec";
const TILE_IMAGE = "tile.png"; 

const ROWS = 10, COLS = 15, TARGET = 10;
let board = [], cells = [], selected = [];
let score = 0, time = 120, timerInterval, gameOver = false;
let isDragging = false, startCell = null, endCell = null;
let bgmStarted = false;

const bgm = document.getElementById("bgm");
const sfxScore = document.getElementById("sfx-score");

// 브라우저 정책상 첫 상호작용(클릭 등)이 있어야 소리가 출력됩니다.
function handleFirstClick() {
    if (!bgmStarted) {
        bgm.play().catch(() => {});
        bgmStarted = true;
        document.getElementById("bgm-notice").style.display = "none";
    }
}

document.getElementById("startBtn").onclick = (e) => {
    e.stopPropagation(); // body의 handleFirstClick 중복 방지
    const name = document.getElementById("username").value;
    if (!name) { alert("닉네임을 입력해 주세요!"); return; }
    
    handleFirstClick(); // 시작 버튼 클릭 시에도 BGM 체크
    
    document.getElementById("game-controls").style.display = "none";
    document.getElementById("game").style.display = "block";
    init();
    startTimer();
    setTimeout(resizeBoard, 50);
};

function init() {
    const b = document.getElementById("board");
    b.innerHTML = ""; board = []; cells = [];
    for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
            const val = Math.floor(Math.random() * 9) + 1;
            board[r][c] = val;
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.r = r; cell.dataset.c = c;
            const img = document.createElement("img");
            img.src = TILE_IMAGE;
            cell.appendChild(img);
            const span = document.createElement("span");
            span.textContent = val;
            cell.appendChild(span);
            b.appendChild(cell);
            cells.push(cell);
        }
    }
}

function handleStart(e) {
    if (gameOver || !document.getElementById("game").style.display === "block") return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    const cell = document.elementFromPoint(clientX, clientY)?.closest('.cell');
    if (!cell) return;
    isDragging = true;
    startCell = [+cell.dataset.r, +cell.dataset.c];
    endCell = startCell;
    updateSelected();
}

function handleMove(e) {
    if (!isDragging || gameOver) return;
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    const el = document.elementFromPoint(clientX, clientY);
    const cell = el?.closest('.cell');
    if (!cell) return;
    const r = +cell.dataset.r, c = +cell.dataset.c;
    if (endCell[0] === r && endCell[1] === c) return;
    endCell = [r, c];
    updateSelected();
}

function handleEnd() {
    if (!isDragging) return;
    isDragging = false;
    const sum = selected.reduce((a, [r, c]) => a + board[r][c], 0);
    
    if (sum === TARGET) {
        // 점수 획득 시 효과음 재생
        sfxScore.currentTime = 0; 
        sfxScore.play().catch(() => {});

        selected.forEach(([r, c]) => {
            board[r][c] = 0;
            cells[r * COLS + c].querySelector("span").textContent = "";
            cells[r * COLS + c].querySelector("img").style.opacity = "0.05";
        });
        score += selected.length;
        document.getElementById("score").textContent = score;
    }
    cells.forEach(c => c.classList.remove("selected"));
    selected = [];
}

function updateSelected() {
    const [r1, c1] = startCell;
    const [r2, c2] = endCell;
    const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
    const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
    cells.forEach(c => c.classList.remove("selected"));
    selected = [];
    for (let r = minR; r <= maxR; r++) {
        for (let c = minC; c <= maxC; c++) {
            if (board[r][c] !== 0) {
                selected.push([r, c]);
                cells[r * COLS + c].classList.add("selected");
            }
        }
    }
}

document.addEventListener("mousedown", handleStart);
document.addEventListener("mousemove", handleMove);
window.addEventListener("mouseup", handleEnd);
document.addEventListener("touchstart", (e) => {
    if (e.target.closest('.cell')) e.preventDefault();
    handleStart(e);
}, { passive: false });
document.addEventListener("touchmove", (e) => {
    if (isDragging) e.preventDefault();
    handleMove(e);
}, { passive: false });
window.addEventListener("touchend", handleEnd);

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        time--;
        document.getElementById("timer").textContent = time;
        if (time <= 0) endGame();
    }, 1000);
}

async function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
    const nickname = document.getElementById("username").value;
    document.getElementById("end").style.display = "flex";
    document.getElementById("finalScore").textContent = nickname + "님의 최종 점수: " + score;
}

function resizeBoard() {
    const b = document.getElementById('board');
    const winW = window.innerWidth;
    if (!b || winW >= 788) {
        if(b) b.style.transform = `scale(1)`;
        return;
    }
    const scale = (winW * 0.95) / 788;
    b.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resizeBoard);
</script>
</body>
</html>
