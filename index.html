<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 흐융사과게임 🍎</title>
<style>
   /* 배경 설정: 3개의 큰 사과 이미지 배치 */
body {
    font-family: 'Malgun Gothic', sans-serif;
    text-align: center;
    margin: 0;
    background-color: #ffffff;
    background-image: url('tile.png'), url('tile.png'), url('tile.png');
    background-position: left -50px center, right -50px center, center bottom -100px;
    background-repeat: no-repeat;
    background-size: 40% auto, 40% auto, 50% auto;
    background-attachment: fixed;
    overflow-x: hidden;
}

/* 🌟 제목: display를 block으로 하여 무조건 한 줄 차지 */
h2 { 
    display: block; 
    margin: 50px auto 20px auto; 
    background: rgba(255,255,255,0.8);
    padding: 10px 30px; 
    border-radius: 15px;
    width: fit-content; 
    position: relative;
    z-index: 20;
}

/* 🌟 컨트롤러: 중복을 제거하고 flex-direction: column 적용 */
#game-controls { 
    display: flex;             /* 수평/수직 제어를 위해 flex 사용 */
    flex-direction: column;    /* 세로 방향(줄바꿈)으로 배치 */
    align-items: center;       /* 가로 중앙 정렬 */
    gap: 15px;                 /* 요소 사이 간격 */
    margin: 0 auto 20px auto; 
    background: rgba(255,255,255,0.8);
    padding: 30px;
    border-radius: 15px;
    position: relative;
    z-index: 20;
    width: fit-content;        
}

/* 🌟 입력창과 버튼 스타일 */
input#username { 
    padding: 12px; 
    border: 1px solid #ccc; 
    border-radius: 8px; 
    width: 220px; 
    font-size: 16px;
    box-sizing: border-box;
}

#startBtn { 
    padding: 12px; 
    width: 220px; 
    background: #4caf50; 
    color: #fff; 
    border: none; 
    border-radius: 8px; 
    font-weight: bold; 
    font-size: 18px;
    cursor: pointer;
    box-sizing: border-box;
}

/* 게임 보드 및 기타 스타일 (기존 유지) */
#board {
    display: grid;
    grid-template-columns: repeat(15, 52px);
    grid-template-rows: repeat(10, 52px);
    justify-content: center;
    margin: 20px auto;
    border: 4px solid #333; 
    width: max-content;
    background: rgba(255, 255, 255, 0.96);
    user-select: none;
    position: relative;
    z-index: 15;
    box-shadow: 0 0 30px rgba(0,0,0,0.15);
}

.cell {
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
}

.cell img {
    position: absolute; width: 90%; height: 90%;
    object-fit: contain;
    opacity: 0.7; 
    z-index: 0; pointer-events: none;
}

.cell span {
    position: relative; z-index: 1;
    color: #000; font-size: 24px; font-weight: bold;
    text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
}

.selected {
    background-color: rgba(76, 175, 80, 0.3);
    outline: 2px solid #4caf50;
    z-index: 5;
}

#info-panel { 
    font-size: 20px; 
    margin-bottom: 10px; 
    font-weight: bold; 
    position: relative; 
    z-index: 20;
    background: rgba(255,255,255,0.8);
    display: inline-block;
    padding: 5px 15px;
    border-radius: 20px;
}

#end {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); color: #fff;
    flex-direction: column; align-items: center; justify-content: center; z-index: 100;
}

#rankingBox {
    background: rgba(255, 255, 255, 0.1);
    padding: 20px; border-radius: 10px;
    width: 280px; margin-top: 15px;
}

.rank-item {
    display: flex; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<h2>🍎 흐융사과게임 🍎</h2>

<div id="game-controls">
    <input id="username" placeholder="닉네임 입력">
    <button id="startBtn">게임 시작</button>
</div>

<div id="game" style="display:none">
    <div id="info-panel">⏰ <span id="timer">120</span> | 🏆 점수: <span id="score">0</span></div>
    <div id="board"></div>
</div>

<div id="end">
    <h3 id="endMsg">게임 종료!</h3>
    <div id="finalScore" style="font-size: 22px; margin-bottom: 10px;"></div>
    <div id="rankingBox">
        <h4 style="margin:0 0 10px 0; color: #ffeb3b;">🌍 실시간 온라인 TOP 10</h4>
        <div id="rankingList">데이터 동기화 중...</div>
    </div>
    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px;">다시 시작</button>
</div>

<audio id="bgm" src="bgm.mp3" loop></audio>

<script>
const RANKING_URL = "본인의_구글_배포_URL";
const TILE_IMAGE = "tile.png"; 

const ROWS = 10, COLS = 15, TARGET = 10;
let board = [], cells = [], selected = [];
let score = 0, time = 120, timerInterval, gameOver = false;
let isDragging = false, startCell = null, endCell = null;

const bgm = document.getElementById("bgm");

document.getElementById("startBtn").onclick = () => {
    const name = document.getElementById("username").value;
    if (!name) { alert("닉네임을 입력해 주세요!"); return; }
    document.getElementById("game-controls").style.display = "none";
    document.getElementById("game").style.display = "block";
    init();
    startTimer();
    bgm.play().catch(() => {});
};

function init() {
    const b = document.getElementById("board");
    b.innerHTML = "";
    board = []; cells = [];
    for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
            const val = Math.floor(Math.random() * 9) + 1;
            board[r][c] = val;
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.r = r; cell.dataset.c = c;
            const img = document.createElement("img");
            img.src = TILE_IMAGE;
            cell.appendChild(img);
            const span = document.createElement("span");
            span.textContent = val;
            cell.appendChild(span);
            b.appendChild(cell);
            cells.push(cell);
        }
    }
}

document.addEventListener("mousedown", e => {
    if (gameOver) return;
    const cell = e.target.closest('.cell');
    if (!cell) return;
    isDragging = true;
    startCell = [+cell.dataset.r, +cell.dataset.c];
    endCell = startCell;
    update();
});

document.addEventListener("mousemove", e => {
    if (!isDragging || gameOver) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cell = el?.closest('.cell');
    if (!cell) return;
    const r = +cell.dataset.r, c = +cell.dataset.c;
    if (endCell[0] === r && endCell[1] === c) return;
    endCell = [r, c];
    update();
});

window.addEventListener("mouseup", () => {
    if (!isDragging) return;
    isDragging = false;
    const sum = selected.reduce((a, [r, c]) => a + board[r][c], 0);
    if (sum === TARGET) {
        selected.forEach(([r, c]) => {
            board[r][c] = 0;
            cells[r * COLS + c].querySelector("span").textContent = "";
            cells[r * COLS + c].querySelector("img").style.opacity = "0.05";
        });
        score += selected.length;
        document.getElementById("score").textContent = score;
    }
    cells.forEach(c => c.classList.remove("selected"));
    selected = [];
});

function update() {
    const [r1, c1] = startCell;
    const [r2, c2] = endCell;
    const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
    const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
    cells.forEach(c => c.classList.remove("selected"));
    selected = [];
    for (let r = minR; r <= maxR; r++) {
        for (let c = minC; c <= maxC; c++) {
            if (board[r][c] !== 0) {
                selected.push([r, c]);
                cells[r * COLS + c].classList.add("selected");
            }
        }
    }
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        time--;
        document.getElementById("timer").textContent = time;
        if (time <= 0) endGame();
    }, 1000);
}

async function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
    bgm.pause();
    const nickname = document.getElementById("username").value;
    document.getElementById("end").style.display = "flex";
    document.getElementById("finalScore").textContent = nickname + "님의 점수: " + score;
    try {
        const res = await fetch(`${RANKING_URL}?name=${encodeURIComponent(nickname)}&score=${score}`);
        const data = await res.json();
        let html = "";
        data.forEach((item, i) => {
            html += `<div class="rank-item"><span>${i + 1}위. ${item.name}</span><span style="color:#4caf50;">${item.score}점</span></div>`;
        });
        document.getElementById("rankingList").innerHTML = html || "데이터가 없습니다.";
    } catch (e) {
        document.getElementById("rankingList").textContent = "랭킹 로드 실패";
    }
}
</script>
</body>
</html>
